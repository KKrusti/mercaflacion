version: '3'

dotenv: ['.env']

tasks:
  backend:
    desc: Levanta el servidor de desarrollo (Go) en http://localhost:8080
    cmds:
      - go run ./cmd/devserver

  dev:
    desc: Levanta backend + frontend. Frontend disponible en http://localhost:5173
    cmds:
      - task: dev:deps
      - echo "Backend ->  http://localhost:8080"
      - echo "Frontend -> http://localhost:5173"
      - task --parallel dev:backend dev:frontend

  dev:deps:
    desc: Instala dependencias del frontend en filesystem Linux nativo (evita problemas NTFS)
    vars:
      NM_LINUX: /home/carlos/.npm-workspaces/basket-cost
    cmds:
      - mkdir -p {{.NM_LINUX}}
      - cp frontend/package.json {{.NM_LINUX}}/package.json
      - npm install --prefix {{.NM_LINUX}}
      - |
        if [ ! -L frontend/node_modules ]; then
          rm -rf frontend/node_modules
          ln -s {{.NM_LINUX}}/node_modules frontend/node_modules
        fi
    silent: true

  test:backend:
    desc: Corre los tests del backend (Go). Requiere DATABASE_URL para los tests de integración.
    cmds:
      # -p 1: run packages sequentially — store and handlers share the same Neon DB
      # and their truncateAll operations would deadlock if run concurrently.
      - go test -p 1 ./...

  test:frontend:
    desc: Corre los tests del frontend (Vitest)
    dir: frontend
    cmds:
      - npm test

  test:
    desc: Corre todos los tests (backend + frontend)
    cmds:
      - task: test:backend
      - task: test:frontend

  dev:backend:
    cmds:
      - go run ./cmd/devserver

  dev:frontend:
    dir: frontend
    cmds:
      - npm run dev

  seed:
    desc: Importa PDFs de tickets de Mercadona en la BD. Requiere DATABASE_URL y -dir o ficheros.
    cmds:
      - go run ./cmd/seed {{.CLI_ARGS}}

  test:e2e:
    desc: Ejecuta los tests E2E con Playwright (headless, Chromium + móvil Poco X6 Pro)
    dir: frontend
    cmds:
      - npm run test:e2e

  test:e2e:headed:
    desc: Ejecuta los tests E2E con Playwright en modo headed (ventana visible)
    dir: frontend
    cmds:
      - npm run test:e2e:headed

  enrich:
    desc: Enriquece imágenes de productos desde la API de Mercadona. Requiere DATABASE_URL.
    cmds:
      - go run ./cmd/enrich

  kill:
    desc: "Mata el proceso del backend que escucha en :8080"
    cmds:
      - fuser -k 8080/tcp || true
