# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Build
      run: go build -v ./...

    - name: Test
      env:
        # DATABASE_URL is intentionally absent: integration tests require a
        # dedicated test database, not the production one. Without it they
        # skip automatically, so only unit tests run here.
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
      run: go test -p 1 -v ./...
