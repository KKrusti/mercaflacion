name: Enrich product images

on:
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run enricher
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: go run ./cmd/enrich
